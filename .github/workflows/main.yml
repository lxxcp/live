name: Daily Update
on:
  workflow_dispatch:
    branches:
      - main

jobs:
 name: deploy to staging
    runs-on: ubuntu-latest

     steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

        
     - name: Run Python script   
      run: python main.py
