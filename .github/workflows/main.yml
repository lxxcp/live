name: Main Script
# 定义触发条件
on:
   push:
    branches:
      - main  # 只在推送到main分支时触发

# 定义工作流的步骤
jobs:
  run-main:
    runs-on: ubuntu-latest  # 使用最新的Ubuntu环境运行

    steps:
      - name: Checkout code  # 检出代码
        uses: actions/checkout@v3

      - name: Set up Python  # 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # 使用Python 3.9

      - name: Install dependencies  # 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r config.txt  # 假设你有一个requirements.txt文件

      - name: Run main.py  # 运行main.py
        run: python main.py
