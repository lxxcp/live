name: Daily Update
on:
  push:
    branches:
      - main  # 或者你的默认分支名称
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - uses: actions/checkout@v2
 
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # 如果有requirements.txt文件
    - name: Run main.py
      run: python main.py

