name: Daily Update
on:
  push:
       branches: [ main ]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - uses: actions/checkout@v3
 
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: 3.8
 
    - name: Run main.py
      run: python main.py

